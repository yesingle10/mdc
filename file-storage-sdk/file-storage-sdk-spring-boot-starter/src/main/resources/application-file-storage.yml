# 文件存储服务配置
# 其他系统集成时，只需引入 SDK 依赖并在 application.yml 中配置即可

file-storage:
  # 存储后端：aliyun-oss
  provider: aliyun-oss

  # 阿里云 OSS 配置
  bucket: leite
  endpoint: oss-cn-hangzhou.aliyuncs.com
  access-key-id: ${ALIBABACLOUD_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${ALIBABACLOUD_ACCESS_KEY_SECRET:your-access-key-secret}

  # CDN 域名（可选，用于生成访问 URL）
  cdn-domain: https://cdn.yourdomain.com

  # 默认签名 URL 过期时间（分钟）
  default-expire-minutes: 60

  # 分片上传阈值（10MB）
  multipart-threshold: 10485760
  multipart-part-size: 5242880
